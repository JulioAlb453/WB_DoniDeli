# fly.toml app configuration file generated for wb-donideli on 2026-04-16T08:51:33-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'wb-donideli'
primary_region = 'dfw'

[build]

[env]
  HEARTBEAT_INTERVAL = '30s'
  MAX_CONNS_PER_CLIENT = '5'
  MAX_MESSAGE_SIZE = '4096'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
